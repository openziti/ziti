syntax = "proto3";

package ziti.loop4.pb;
option go_package = "github.com/openziti/ziti/zititest/v2/ziti-test/subcmd/loop4/pb/loop4_pb";

enum ContentType {
  ZeroContentType = 0;
  // Values 1-5 are reserved by channel/v4 (Ping=1, Result=2, Latency=3,
  // LatencyResponse=4, Heartbeat=5). User content types start at 1000 to
  // match the convention used by ctrl_pb / edge_client_pb / edge_ctrl_pb.
  RunScenarioRequestType = 1000;
  RunScenarioResultType = 1001;
  RequestDiagnostic = 1002;
}

enum HeaderType {
  ZeroHeaderType = 0;
  ScenarioId = 100;
  ScenarioSuccess = 101;
  RequestIdHeader = 102;
}

message Test {
  string name = 1;
  int32 txRequests = 2;
  string txPacing = 3;
  string txMaxJitter = 4;
  string txPauseEvery = 5;
  string txPauseFor = 6;
  bool txAfterRx = 19;

  int32 rxRequests = 7;
  string rxTimeout = 8;
  string rxPauseEvery = 9;
  string rxPauseFor = 10;

  int32 payloadMinBytes = 11;
  int32 payloadMaxBytes = 12;
  int32 latencyFrequency = 13;
  string txBlockType = 14;
  string rxBlockType = 15;
  int32 rxSeqBlockSize = 16;
  string rxPacing = 17;
  string rxMaxJitter = 18;
}

message ScenarioComplete {
  bool success = 1;
}
