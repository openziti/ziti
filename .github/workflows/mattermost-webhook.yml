name: Send Event to Mattermost with Javascript SDK
on:
  create:
  delete:
  issues:
  issue_comment:
  pull_request_review:
  pull_request_review_comment:
  pull_request:
  push:
  fork:
  release:
  workflow_dispatch:

jobs:
  mattermost-ziti-webhook:
    runs-on: ubuntu-24.04
    name: POST Webhook
    if: github.repository_owner == 'openziti' && github.actor != 'dependabot[bot]'
    env:
      ZITI_LOG: 99
      ZITI_NODEJS_LOG: 99
    steps:
      - uses: openziti/ziti-webhook-action@main
        with:
          ziti-id: ${{ secrets.ZITI_MATTERMOST_IDENTITY }}
          webhook-url: http://webhook.mattermost.ziti.internal/plugins/github/webhook
          webhook-secret: ${{ secrets.ZITI_MATTERMOSTI_WEBHOOK_SECRET }}

