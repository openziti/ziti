# systemd drop-in override for ziti-router.service
#
# This file is managed by the openziti-router package. Local edits are
# preserved across upgrades (dpkg conffile / rpm noreplace).
#
# Uncomment directives as needed, then run:  systemctl daemon-reload
#
[Service]

# Allow binding low ports, e.g., 443/tcp. Required when ZITI_ROUTER_PORT <= 1024.
# AmbientCapabilities=CAP_NET_BIND_SERVICE

# Allow adding IP routes and iptables rules. Required when ZITI_ROUTER_MODE=tproxy.
# AmbientCapabilities=CAP_NET_ADMIN

# Use an alternate config file. Clear ExecStart before redefining it.
# ExecStart=
# ExecStart=/usr/bin/ziti router run alt_config.yml $ZITI_ARGS

# Pass additional arguments to the router, e.g., --log-formatter text
# This is set in service.env, but you can override it here.
# Environment=ZITI_ARGS=--log-formatter text
