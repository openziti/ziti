# systemd drop-in override for ziti-controller.service
#
# This file is managed by the openziti-controller package. Local edits are
# preserved across upgrades (dpkg conffile / rpm noreplace).
#
# Uncomment directives as needed, then run:  systemctl daemon-reload
#
[Service]

# Allow binding low ports, e.g., 443/tcp.
# NOTE: use TLS passthrough if fronting with a reverse proxy, i.e., "raw" TCP proxy.
# AmbientCapabilities=CAP_NET_BIND_SERVICE

# Use an alternate config file. Clear ExecStart before redefining it.
# ExecStart=
# ExecStart=/usr/bin/ziti controller run alt_config.yml $ZITI_ARGS

# Pass additional arguments to the controller, e.g., --log-formatter text
# This is set in service.env, but you can override it here.
# Environment=ZITI_ARGS=--log-formatter text
