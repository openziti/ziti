v: 3

db: ${ZITI_TEST_DB}

identity:
  cert: testdata/pki/ctrl1/certs/client.chain.pem
  server_cert: testdata/pki/ctrl1/certs/server.chain.pem
  key: testdata/pki/ctrl1/keys/client.key
  server_key: testdata/pki/ctrl1/keys/server.key
  ca: testdata/pki/root/certs/root.cert

trustDomain: ziti.test

ctrl:
  listener: tls:127.0.0.1:6262

mgmt:
  listener: tls:127.0.0.1:10000

terminator:
  validators:
    edge: edge

edge:
  api:
    sessionTimeout: 30m
    address: 127.0.0.1:1281
  enrollment:
    signingCert:
      cert: testdata/pki/ctrl1/certs/ctrl1.chain.pem
      key: testdata/pki/ctrl1/keys/ctrl1.key
      ca: testdata/pki/root/certs/root.cert
    edgeIdentity:
      duration: 20m
    edgeRouter:
      duration: 60m


web:
  - name: primary-server
    bindPoints:
      - interface: 127.0.0.1:1281
        address: 127.0.0.1:1281
    options: {}
    apis:
      - binding: health-checks
      - binding: fabric
      - binding: edge-management
      - binding: edge-client
      - binding: edge-oidc
        options:
          redirectURIs:
            - "http://localhost:*/auth/callback"
            - "http://127.0.0.1:*/auth/callback"

  # This server's bind point interface is an unbindable address (TEST-NET-1, not
  # assigned to any local interface), so its Listener fails at startup. This models
  # the failing edge-oidc listener: the controller must log the error and keep the
  # primary server running, not panic.
  - name: failing-oidc-server
    bindPoints:
      - interface: 192.0.2.1:1282
        address: 127.0.0.1:1282
    options: {}
    apis:
      - binding: edge-oidc
        options:
          redirectURIs:
            - "http://localhost:*/auth/callback"
            - "http://127.0.0.1:*/auth/callback"
