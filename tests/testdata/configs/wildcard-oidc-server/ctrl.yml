v: 3

db: ${ZITI_TEST_DB}

# Wildcard server cert (*.wildcard.test) via alt_server_certs. A wildcard SAN becomes an OIDC issuer only
# for the edge-oidc 'allowedHostnames' it covers (here, ctrl.wildcard.test).
identity:
  cert: testdata/pki/ctrl1/certs/client.chain.pem
  server_cert: testdata/pki/ctrl1/certs/server.chain.pem
  key: testdata/pki/ctrl1/keys/client.key
  server_key: testdata/pki/ctrl1/keys/server.key
  ca: testdata/pki/root/certs/root.cert
  alt_server_certs:
    - server_cert: testdata/pki/ctrl1/certs/ctrl1-wildcard.chain.pem
      server_key: testdata/pki/ctrl1/keys/ctrl1-wildcard.key

trustDomain: ziti.test

ctrl:
  listener: tls:127.0.0.1:6262

mgmt:
  listener: tls:127.0.0.1:10000

terminator:
  validators:
    edge: edge

edge:
  api:
    sessionTimeout: 30m
    address: 127.0.0.1:1281
  enrollment:
    signingCert:
      cert: testdata/pki/ctrl1/certs/ctrl1.chain.pem
      key: testdata/pki/ctrl1/keys/ctrl1.key
      ca: testdata/pki/root/certs/root.cert
    edgeIdentity:
      duration: 20m
    edgeRouter:
      duration: 60m

web:
  - name: client-management
    bindPoints:
      - interface: 127.0.0.1:1281
        address: 127.0.0.1:1281
    options: {}
    apis:
      - binding: health-checks
      - binding: fabric
      - binding: edge-management
      - binding: edge-client
      - binding: edge-oidc
        options:
          allowedHostnames:
            - ctrl.wildcard.test
          redirectURIs:
            - "http://localhost:*/auth/callback"
            - "http://127.0.0.1:*/auth/callback"
