v: 3

db: ${ZITI_TEST_DB}

# Models a controller fronted by a wildcard (e.g. LetsEncrypt) certificate supplied via alt_server_certs.
# The primary server_cert is an ordinary cert (SANs: localhost / loopback IPs), standing in for a
# quickstart/host cert. The alt server cert's only SAN is the wildcard *.wildcard.test, standing in for the
# LetsEncrypt cert. The edge-oidc API derives its OIDC issuers from the SANs of ALL active server certs
# (identity.GetX509ActiveServerCertChains, which includes alt certs), so the wildcard becomes an issuer
# served via a request-host-derived issuer URL. See controller/oidc_auth/provider.go (isWildcardIssuer /
# IssuerFromHost) and controller/webapis/oidc-api.go (getPossibleIssuers).
identity:
  cert: testdata/ca/intermediate/certs/ctrl-client.cert.pem
  server_cert: testdata/ca/intermediate/certs/ctrl-server.cert.pem
  key: testdata/ca/intermediate/private/ctrl.key.pem
  ca: testdata/ca/intermediate/certs/ca-chain.cert.pem
  alt_server_certs:
    - server_cert: testdata/ca/intermediate/certs/ctrl-server-wildcard.cert.pem
      server_key: testdata/ca/intermediate/private/ctrl.key.pem

trustDomain: at-test

ctrl:
  listener: tls:127.0.0.1:6262

mgmt:
  listener: tls:127.0.0.1:10000

terminator:
  validators:
    edge: edge

edge:
  api:
    sessionTimeout: 30m
    address: 127.0.0.1:1281
  enrollment:
    signingCert:
      cert: testdata/ca/intermediate/certs/intermediate.cert.pem
      key: testdata/ca/intermediate/private/intermediate.key.decrypted.pem
      ca: testdata/ca/intermediate/certs/ca-chain.cert.pem
    edgeIdentity:
      duration: 20m
    edgeRouter:
      duration: 60m

web:
  - name: client-management
    bindPoints:
      - interface: 127.0.0.1:1281
        address: 127.0.0.1:1281
    options: {}
    apis:
      - binding: health-checks
      - binding: fabric
      - binding: edge-management
      - binding: edge-client
      - binding: edge-oidc
        options:
          redirectURIs:
            - "http://localhost:*/auth/callback"
            - "http://127.0.0.1:*/auth/callback"
